<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TKAWEN Studio — معرض التصاميم اليومية</title>
<meta name="description" content="تصاميم سوشيال ميديا تُولَّد تلقائياً 24/7 لمنظومة TKAWEN — Mystoq, LIQAA, Algeria Certify, PharmaPro.">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:#0b1020;color:#e2e8f0;min-height:100vh}
header{padding:56px 24px 36px;text-align:center;background:radial-gradient(60% 120% at 50% 0,#1e3a8a55,transparent)}
.kick{font-family:'Inter',sans-serif;font-weight:800;letter-spacing:.28em;font-size:13px;color:#60a5fa;text-transform:uppercase}
h1{font-size:clamp(30px,5vw,52px);font-weight:900;margin:14px 0 10px;background:linear-gradient(135deg,#fff,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#94a3b8;font-size:17px;max-width:640px;margin:0 auto;line-height:1.6}
.stat{margin-top:18px;font-size:14px;color:#64748b}
.grid{max-width:1280px;margin:30px auto 70px;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px}
.card{background:#111935;border:1px solid #1e2a4a;border-radius:18px;overflow:hidden;transition:transform .15s,border-color .15s}
.card:hover{transform:translateY(-4px);border-color:#3b82f6}
.card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#0b1020}
.meta{padding:16px 18px}
.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.proj{font-weight:800;color:#93c5fd;font-size:15px;text-transform:capitalize}
.date{font-family:'Inter',sans-serif;font-size:12px;color:#64748b}
.cap{font-size:13.5px;color:#94a3b8;line-height:1.55;max-height:60px;overflow:hidden}
.dl{display:inline-block;margin-top:12px;font-size:13px;font-weight:700;color:#60a5fa;text-decoration:none}
.empty{grid-column:1/-1;text-align:center;color:#64748b;padding:60px}
footer{text-align:center;padding:30px;color:#475569;font-size:13px;border-top:1px solid #1e2a4a}
footer a{color:#60a5fa;text-decoration:none}
</style>
</head>
<body>
<header>
  <div class="kick">TKAWEN STUDIO</div>
  <h1>معرض التصاميم اليومية</h1>
  <p class="sub">تصاميم سوشيال ميديا احترافية تُولَّد وتُصمَّم تلقائياً 24/7 على GitHub — لكل منتجات منظومة TKAWEN.</p>
  <div class="stat" id="stat"></div>
</header>
<main class="grid" id="grid"><div class="empty">جارٍ التحميل…</div></main>
<footer>صُنع تلقائياً بواسطة <a href="https://github.com/hartemyaakoub/tkawen-studio">TKAWEN Studio</a> · <a href="https://tkawen.com">tkawen.com</a></footer>
<script>
fetch('designs.json?_=' + Date.now()).then(r => r.ok ? r.json() : []).then(items => {
  const grid = document.getElementById('grid');
  if (!items.length) { grid.innerHTML = '<div class="empty">لا تصاميم بعد — أول تشغيل يولّدها.</div>'; return; }
  document.getElementById('stat').textContent = items.length + ' تصميم · يتجدّد يومياً';
  grid.innerHTML = items.map(it => `
    <div class="card">
      <img loading="lazy" src="${it.img}" alt="${it.project}">
      <div class="meta">
        <div class="row"><span class="proj">${it.project}</span><span class="date">${it.date}</span></div>
        <div class="cap">${(it.caption||'').slice(0,120)}</div>
        <a class="dl" href="${it.img}" download>⬇ تحميل</a>
      </div>
    </div>`).join('');
}).catch(() => { document.getElementById('grid').innerHTML = '<div class="empty">تعذّر التحميل.</div>'; });
</script>
</body>
</html>
